<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заявки с аккаунтом</title>

<style>
body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px;
    background-color: #f4f9ff;
    position: relative;
}

#loginBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 40px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#userInfo {
    position:absolute;
    top:20px;
    right:120px;
    display:flex;
    align-items:center;
    gap:10px;
}

.user-avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    border:2px solid #007bff;
}

.form-container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 300px;
    margin-bottom: 40px;
}

input, textarea, input[type="file"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}

#feed {
    width: 500px;
    max-width: 100%;
}

.post {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
    position: relative;
}

.like-btn {
    background: #2196F3;
}

.delete-btn {
    position:absolute;
    top:10px;
    right:10px;
    background:#f44336;
    color:white;
    border:none;
    width:20px;        /* 🔥 было 60px — теперь в 2 раза меньше */
    height:30px;
    border-radius:50%;  /* 🔥 круглая кнопка */
    font-size:14px;
    cursor:pointer;
}
/* КНОПКА СООБЩЕНИЙ */
#messagesBtn{
    position: fixed;
    left: 20px;
    top: 6%;
    transform: translateY(-50%);
    width: 100px;
    height: 55px;
    border-radius: 20%;
    border: none;
    background: #2196F3;
    color: white;
    font-size: 13px;
    cursor: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

/* ОКНО ЧАТА */
#chatWindow{
    position: fixed;
    left: -400px;
    top: 0;
    width: 350px;
    height: 100%;
    background: #f1f5f9;
    box-shadow: 5px 0 20px rgba(0,0,0,0.2);
    transition: 0.4s;
    padding: 20px;
    overflow-y: auto;
    z-index: 1000;
}

#chatWindow.active{
    left: 0;
}

#closeChat{
    background: #f44336;
    border: none;
    color: white;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    margin-bottom: 15px;
}
.user-item{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
}

.user-item:hover{
    background:#e3f2fd;
}

.user-item img{
    width:40px;
    height:40px;
    border-radius:50%;
}
</style>
</head>

<body>
<button id="messagesBtn">Сообщения</button>
<button id="loginBtn">Войти</button>
<div id="userInfo"></div>

<div class="form-container">
<h3>Создать / Редактировать заявку</h3>

<form id="feedbackForm">

<input type="text" id="username" placeholder="Ваше имя" required>
<input type="email" id="userEmail" placeholder="Ваш Email" required>
<textarea id="userComment" placeholder="Ваш комментарий" required></textarea>

<button type="submit" id="mainBtn">Сохранить</button>

</form>
</div>

<div id="feed"></div>
<div id="chatWindow">
    <button id="closeChat">Закрыть</button>

    <h3>Сообщения</h3>

    <div id="usersList"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
getFirestore, addDoc, collection, serverTimestamp,
onSnapshot, query, orderBy, doc,
updateDoc, increment, deleteDoc,
where, getDocs, setDoc
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { 
getAuth, GoogleAuthProvider,
signInWithPopup, signOut,
onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";


    const firebaseConfig = {
    apiKey: "AIzaSyBVbhWbVDyhWGqC4x176LpjzSnrTE_rKe0",
    authDomain: "gf-8654a.firebaseapp.com",
    projectId: "gf-8654a",
    storageBucket: "gf-8654a.firebasestorage.app",
    messagingSenderId: "716147853392",
    appId: "1:716147853392:web:f87336c7a9378fb93f6955",
    measurementId: "G-7HJ13ZP986"
    };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

const loginBtn = document.getElementById("loginBtn");
const form = document.getElementById("feedbackForm");
const feed = document.getElementById("feed");
const userInfo = document.getElementById("userInfo");


// ================= AUTH =================

onAuthStateChanged(auth, async (user) => {

    if (user) {

        currentUser = user;
        loginBtn.textContent = "Выйти";

        userInfo.innerHTML = `
            <img src="${user.photoURL || ''}" class="user-avatar">
            <span>${user.displayName || "Без имени"}</span>
        `;

        await setDoc(doc(db,"users",user.uid),{
            uid:user.uid,
            name:user.displayName || "Без имени",
            email:user.email,
            photo:user.photoURL || ""
        });

        loadUsers();
        loadPosts();

    } else {

        currentUser = null;
        loginBtn.textContent = "Войти";
        userInfo.innerHTML = "";
    }

});

loginBtn.onclick = async () => {

    if (currentUser) {
        await signOut(auth);
    } else {
        await signInWithPopup(auth, provider);
    }

};


// ================= СОХРАНЕНИЕ =================

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    if (!currentUser) return alert("Сначала войдите!");

    const name = document.getElementById("username").value;
    const email = document.getElementById("userEmail").value;
    const comment = document.getElementById("userComment").value;
    const q = query(
        collection(db,"requests"),
        where("uid","==",currentUser.uid)
    );

    const snapshot = await getDocs(q);

    if (snapshot.empty) {

        await addDoc(collection(db,"requests"),{
            uid: currentUser.uid,
            userEmail: currentUser.email,
            name,
            email,
            comment,
            likes:0,
            timestamp:serverTimestamp()
        });

    } else {

        snapshot.forEach(async (docSnap)=>{

            await updateDoc(doc(db,"requests",docSnap.id),{
                name: name || "",
                email: email || "",
                comment: comment || "",
            });
        
        });

    }

    alert("Сохранено!");
});


// ================= ЛАЙК =================

window.processLike = async (id) => {

    if (!currentUser) return;

    await updateDoc(doc(db,"requests",id),{
        likes:increment(1)
    });

};


// ================= УДАЛЕНИЕ =================

window.deletePost = async (id) => {

    if (!currentUser) return;

    await deleteDoc(doc(db,"requests",id));

};


// ================= ЗАГРУЗКА ЗАЯВОК =================

function loadPosts(){

    const q = query(
        collection(db,"requests"),
        orderBy("timestamp","desc")
    );

    onSnapshot(q,(snapshot)=>{

        feed.innerHTML="";

        snapshot.forEach((docItem)=>{

            const data = docItem.data();

            feed.innerHTML += `
            <div class="post">

            <p><strong>${data.name}</strong></p>
            <p>${data.email}</p>
            <p>${data.comment}</p>

            <button class="like-btn"
            onclick="processLike('${docItem.id}')">
            👍 ${data.likes || 0}
            </button>

            ${currentUser && currentUser.uid === data.uid ? `
            <button class="delete-btn"
            onclick="deletePost('${docItem.id}')">
            🗑
            </button>
            ` : ""}

            </div>
            `;
        });
    });
}


// ================= ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ =================

function loadUsers(){

    onSnapshot(collection(db,"users"),(snapshot)=>{

        const usersList = document.getElementById("usersList");
        usersList.innerHTML="";

        snapshot.forEach((docItem)=>{

            const user = docItem.data();

            if(currentUser && user.uid === currentUser.uid) return;

            usersList.innerHTML += `
            <div class="user-item">
                <img src="${user.photo || ''}">
                <span>${user.name}</span>
            </div>
            `;
        });

    });
}

</script>

</body>
</html>
