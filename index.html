<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Заявки с аккаунтом</title>

<style>
body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 50px;
    background-color: #f4f9ff;
    position: relative;
}

#loginBtn {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 40px;
    background: #2196F3;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

#userInfo {
    position:absolute;
    top:20px;
    right:120px;
    display:flex;
    align-items:center;
    gap:10px;
}

.user-avatar {
    width:40px;
    height:40px;
    border-radius:50%;
    border:2px solid #007bff;
}

.form-container {
    background: white;
    padding: 25px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 300px;
    margin-bottom: 40px;
}

input, textarea, input[type="file"] {
    width: 100%;
    padding: 10px;
    margin-bottom: 15px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #4CAF50;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
}

#feed {
    width: 500px;
    max-width: 100%;
}

.post {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 8px;
}

.like-btn {
    background: #2196F3;
}

.delete-btn {
    background:#f44336;
}
</style>
</head>

<body>

<button id="loginBtn">Войти</button>
<div id="userInfo"></div>

<div class="form-container">
    <h3>Отправить заявку</h3>
    <form id="feedbackForm">
        <input type="text" id="username" placeholder="Ваше имя" required>
        <input type="email" id="userEmail" placeholder="Ваш Email" required>
        <textarea id="userComment" placeholder="Ваш комментарий" required></textarea>

        <!-- 🔥 КАРТИНКА -->
        <input type="file" id="imageFile" accept="image/*">

        <button type="submit">Отправить заявку</button>
    </form>
</div>

<div id="feed"></div>

<script type="module">

// ================= FIREBASE =================

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getFirestore, addDoc, collection, serverTimestamp, onSnapshot, query, orderBy, doc, updateDoc, increment, deleteDoc } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

import { getStorage, ref, uploadBytes, getDownloadURL } 
from "https://www.gstatic.com/firebasejs/10.7.0/firebase-storage.js";


const firebaseConfig = {
  apiKey: "ТВОЙ_API_KEY",
  authDomain: "gf-8654a.firebaseapp.com",
  projectId: "gf-8654a",
  storageBucket: "gf-8654a.firebasestorage.app",
  messagingSenderId: "716147853392",
  appId: "1:716147853392:web:f87336c7a9378fb93f6955",
  measurementId: "G-9TE97MNMBQ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const storage = getStorage(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

const loginBtn = document.getElementById("loginBtn");
const form = document.getElementById("feedbackForm");
const feed = document.getElementById("feed");
const userInfo = document.getElementById("userInfo");


// ================= AUTH =================

onAuthStateChanged(auth, (user) => {

    if (user) {

        currentUser = user;
        loginBtn.textContent = "Выйти";

        userInfo.innerHTML = `
            <img src="${user.photoURL}" class="user-avatar">
            <span>${user.displayName}</span>
        `;

    } else {

        currentUser = null;
        loginBtn.textContent = "Войти";
        userInfo.innerHTML = "";
    }

});

loginBtn.addEventListener("click", async () => {

    if (currentUser) {
        await signOut(auth);
    } else {
        await signInWithPopup(auth, provider);
    }

});


// ================= ОТПРАВКА С КАРТИНКОЙ =================

form.addEventListener("submit", async (e) => {

    e.preventDefault();

    if (!currentUser) {
        alert("Войдите через Google!");
        return;
    }

    const name = document.getElementById("username").value;
    const email = document.getElementById("userEmail").value;
    const comment = document.getElementById("userComment").value;
    const imageFile = document.getElementById("imageFile").files[0];

    let imageURL = "";

    if (imageFile) {

        const storageRef = ref(storage, "images/" + Date.now() + "_" + imageFile.name);

        await uploadBytes(storageRef, imageFile);

        imageURL = await getDownloadURL(storageRef);
    }

    await addDoc(collection(db, "requests"), {
        uid: currentUser.uid,
        userEmail: currentUser.email,
        name,
        email,
        comment,
        image: imageURL,
        likes: 0,
        timestamp: serverTimestamp()
    });

    form.reset();
});


// ================= ЛАЙК =================

window.processLike = async (id) => {

    if (!currentUser) return;

    await updateDoc(doc(db,"requests",id), {
        likes: increment(1)
    });
};


// ================= ЛЕНТА =================

const q = query(collection(db, "requests"), orderBy("timestamp","desc"));

onSnapshot(q, (snapshot) => {

    feed.innerHTML = "";

    snapshot.forEach((docItem) => {

        const data = docItem.data();

        feed.innerHTML += `
        <div class="post">

            <p><strong>${data.name}</strong></p>
            <p>${data.comment}</p>

            ${data.image ? 
            `<img src="${data.image}" 
              style="width:100%; border-radius:8px; margin-top:10px;">`
            : ""}

            <button class="like-btn"
                onclick="processLike('${docItem.id}')">
                👍 ${data.likes || 0}
            </button>

        </div>
        `;
    });

});

</script>

</body>
</html>
