<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { 
    getFirestore, 
    addDoc, 
    collection, 
    serverTimestamp, 
    onSnapshot, 
    query, 
    orderBy, 
    doc, 
    updateDoc, 
    increment, 
    deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

import { 
    getAuth, 
    GoogleAuthProvider, 
    signInWithPopup, 
    signOut, 
    onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

const firebaseConfig = {
    apiKey: "ТВОЙ_API_KEY",
    authDomain: "gf-8654a.firebaseapp.com",
    projectId: "gf-8654a",
    storageBucket: "gf-8654a.firebasestorage.app",
    messagingSenderId: "716147853392",
    appId: "1:716147853392:web:f87336c7a9378fb93f6955",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let currentUser = null;

// =======================
// КНОПКА ВХОДА / ВЫХОДА
// =======================

const loginBtn = document.getElementById("loginBtn");

// Проверяем состояние пользователя
onAuthStateChanged(auth, (user) => {
    if (user) {
        currentUser = user;
        loginBtn.textContent = "Выйти";
    } else {
        currentUser = null;
        loginBtn.textContent = "Войти";
    }
});

// Нажатие на кнопку
loginBtn.addEventListener("click", async () => {

    // Если пользователь уже вошёл → выходим
    if (currentUser) {
        await signOut(auth);
        alert("Вы вышли из аккаунта");
        return;
    }

    // Если не вошёл → открываем Google окно
    try {
        await signInWithPopup(auth, provider);
        alert("Вход выполнен!");
    } catch (error) {
        console.error(error);
        alert("Ошибка входа");
    }
});


// =======================
// ОТПРАВКА ЗАЯВКИ (ТОЛЬКО АВТОРИЗОВАННЫЕ)
// =======================

document.getElementById("feedbackForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (!currentUser) {
        alert("Сначала войдите в аккаунт!");
        return;
    }

    const nameInput = document.getElementById("username").value;
    const emailInput = document.getElementById("userEmail").value;
    const commentInput = document.getElementById("userComment").value;

    try {
        await addDoc(collection(db, "requests"), {
            uid: currentUser.uid,
            userEmail: currentUser.email,
            name: nameInput,
            email: emailInput,
            comment: commentInput,
            likes: 0,
            timestamp: serverTimestamp()
        });

        alert("Заявка отправлена!");
        document.getElementById("feedbackForm").reset();

    } catch (error) {
        console.error(error);
        alert("Ошибка отправки");
    }
});


// =======================
// ЛАЙК
// =======================

window.processLike = async (id) => {
    if (!currentUser) {
        alert("Войдите чтобы ставить лайки!");
        return;
    }

    await updateDoc(doc(db, "requests", id), {
        likes: increment(1)
    });
};


// =======================
// УДАЛЕНИЕ
// =======================

window.deletePost = async (id, ownerEmail) => {

    if (!currentUser) return alert("Сначала войдите!");

    if (currentUser.email !== ownerEmail)
        return alert("Удалять можно только свои заявки!");

    if (!confirm("Удалить заявку?")) return;

    await deleteDoc(doc(db, "requests", id));
};


// =======================
// ЛЕНТА
// =======================

const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));

onSnapshot(q, (snapshot) => {

    const feed = document.getElementById("feed");
    feed.innerHTML = "";

    snapshot.forEach((docItem) => {

        const data = docItem.data();

        feed.innerHTML += `
            <div class="post">
                <span class="time">
                    ${data.timestamp?.toDate().toLocaleString() || "..."}
                </span>

                <p><strong>${data.name}</strong></p>
                <p>${data.userEmail}</p>
                <p>${data.comment}</p>

                <button class="like-btn"
                    onclick="processLike('${docItem.id}')">
                    👍 ${data.likes || 0}
                </button>

                ${
                    currentUser && currentUser.email === data.userEmail
                        ? `<button class="delete-btn"
                            onclick="deletePost('${docItem.id}','${data.userEmail}')">
                            🗑
                          </button>`
                        : ""
                }
            </div>
        `;
    });
});
</script>
